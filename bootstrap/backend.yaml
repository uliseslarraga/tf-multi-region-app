Parameters:
  BucketNameParameter:
    Type: String
    Default: tf-backend-bucket-culr-03-2026
    Description: Enter the name of the S3 bucket to create. Must be globally unique.,

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref BucketNameParameter

Outputs:
  BucketName:
    Description: The name of the S3 bucket created for Terraform backend.
    Value: !Ref S3Bucket
